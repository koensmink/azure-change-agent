services:
  postgres:
    image: postgres:16-alpine
    container_name: ms-changes-postgres
    environment:
      POSTGRES_DB: collector
      POSTGRES_USER: collector
      POSTGRES_PASSWORD: collector
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collector -d collector"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  collector:
    build: ./collector
    container_name: ms-changes-collector
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://collector:collector@postgres:5432/collector
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8088:8088"
    volumes:
      - ./collector/data:/app/data
    restart: unless-stopped

volumes:
  postgres-data:
